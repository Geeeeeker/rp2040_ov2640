name: Build Pico OV2640 Firmware

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # 当推送版本标签时触发，用于自动发布
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      camera_model:
        description: 'Camera Model'
        required: true
        type: choice
        default: 'OV2640'
        options:
          - OV2640
          # 未来可扩展其他型号
      custom_pins:
        description: 'Custom GPIO pins (KEY=VALUE,KEY2=VALUE2)'
        required: false
        type: string
        default: 'PIN_SDA=4,PIN_SCL=5,PIN_XCLK=3,PIN_RST=2,PIN_D0=6,PIN_D1=7,PIN_D2=8,PIN_D3=9,PIN_D4=10,PIN_D5=11,PIN_D6=12,PIN_D7=13,PIN_PCLK=14,PIN_HREF=15,PIN_VSYNC=16'
      upload_to_release:
        description: 'Upload to Release? (only works on tag push)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '10.3-2021.10'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Generate pin configuration header
        run: |
          echo "// Auto-generated pin configuration" > src/pins_config.h
          echo "#pragma once" >> src/pins_config.h
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.custom_pins }}"
          for pair in "${PAIRS[@]}"; do
            key=$(echo "$pair" | cut -d'=' -f1)
            val=$(echo "$pair" | cut -d'=' -f2)
            echo "#define $key $val" >> src/pins_config.h
          done
          # 确保摄像头型号宏
          echo "#define CAMERA_MODEL_${{ github.event.inputs.camera_model }}" >> src/pins_config.h
          cat src/pins_config.h

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk

      - name: Build firmware
        run: |
          cd build
          ninja

      - name: Rename output files
        run: |
          cd build
          mv camera_firmware.uf2 camera_firmware-${{ github.event.inputs.camera_model }}-${{ github.run_number }}.uf2
          mv camera_firmware.elf camera_firmware-${{ github.event.inputs.camera_model }}-${{ github.run_number }}.elf
          echo "UF2_FILE=camera_firmware-${{ github.event.inputs.camera_model }}-${{ github.run_number }}.uf2" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-firmware-${{ github.event.inputs.camera_model }}
          path: |
            build/*.uf2
            build/*.elf
          if-no-files-found: error
          retention-days: 30

      # 仅当推送标签且手动触发中选择上传到 Release 时执行
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.upload_to_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
