name: Build Pico OV2640 Firmware

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      camera_model:
        description: 'Camera Model'
        required: true
        type: choice
        default: 'OV2640'
        options:
          - OV2640
      custom_pins:
        description: 'Custom GPIO pins (KEY=VALUE,KEY2=VALUE2)'
        required: false
        type: string
        default: 'PIN_SDA=4,PIN_SCL=5,PIN_XCLK=3,PIN_RST=2,PIN_D0=6,PIN_D1=7,PIN_D2=8,PIN_D3=9,PIN_D4=10,PIN_D5=11,PIN_D6=12,PIN_D7=13,PIN_PCLK=14,PIN_HREF=15,PIN_VSYNC=16'
      upload_to_release:
        description: 'Upload to Release? (only works on tag push)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'false'   # 完全不需要子模块

      - name: Set up ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '10.3-2021.10'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Prepare pin configuration
        id: pins
        run: |
          PINS="${{ github.event.inputs.custom_pins }}"
          if [ -z "$PINS" ]; then
            PINS="PIN_SDA=4,PIN_SCL=5,PIN_XCLK=3,PIN_RST=2,PIN_D0=6,PIN_D1=7,PIN_D2=8,PIN_D3=9,PIN_D4=10,PIN_D5=11,PIN_D6=12,PIN_D7=13,PIN_PCLK=14,PIN_HREF=15,PIN_VSYNC=16"
          fi
          export CUSTOM_PIN_DEFINES=$(echo "$PINS" | tr ',' ';')
          echo "CUSTOM_PIN_DEFINES=$CUSTOM_PIN_DEFINES" >> $GITHUB_ENV

          CAM="${{ github.event.inputs.camera_model }}"
          if [ -z "$CAM" ]; then
            CAM="OV2640"
          fi
          echo "CAMERA_MODEL=$CAM" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCUSTOM_PIN_DEFINES="${{ env.CUSTOM_PIN_DEFINES }}" \
            -DCAMERA_MODEL="${{ env.CAMERA_MODEL }}"

      - name: Build firmware
        run: |
          cd build
          ninja

      - name: Rename output file
        run: |
          cd build
          UF2_FILE=$(ls *.uf2 | head -1)
          NEW_NAME="rp2040_ov2640_${{ env.CAMERA_MODEL }}_${{ github.run_number }}.uf2"
          mv "$UF2_FILE" "$NEW_NAME"
          echo "UF2_FILE=$NEW_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-firmware-${{ env.CAMERA_MODEL }}
          path: build/*.uf2
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
