name: Build Pico OV2640 Firmware

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      camera_model:
        description: 'Camera Model'
        required: true
        type: choice
        default: 'OV2640'
        options:
          - OV2640
      custom_pins:
        description: 'Custom GPIO pins (KEY=VALUE,KEY2=VALUE2)'
        required: false
        type: string
        default: 'PIN_SDA=4,PIN_SCL=5,PIN_XCLK=3,PIN_RST=2,PIN_D0=6,PIN_D1=7,PIN_D2=8,PIN_D3=9,PIN_D4=10,PIN_D5=11,PIN_D6=12,PIN_D7=13,PIN_PCLK=14,PIN_HREF=15,PIN_VSYNC=16'
      upload_to_release:
        description: 'Upload to Release? (only works on tag push)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '10.3-2021.10'

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Prepare pin configuration macros
        id: pins
        run: |
          # 确定使用手动输入还是默认值
          PINS="${{ github.event.inputs.custom_pins }}"
          if [ -z "$PINS" ]; then
            PINS="PIN_SDA=4,PIN_SCL=5,PIN_XCLK=3,PIN_RST=2,PIN_D0=6,PIN_D1=7,PIN_D2=8,PIN_D3=9,PIN_D4=10,PIN_D5=11,PIN_D6=12,PIN_D7=13,PIN_PCLK=14,PIN_HREF=15,PIN_VSYNC=16"
          fi

          CAM="${{ github.event.inputs.camera_model }}"
          if [ -z "$CAM" ]; then
            CAM="OV2640"
          fi

          # 生成 CMake 可用的编译定义
          DEFINES=""
          IFS=',' read -ra PAIRS <<< "$PINS"
          for pair in "${PAIRS[@]}"; do
            key=$(echo "$pair" | cut -d'=' -f1)
            val=$(echo "$pair" | cut -d'=' -f2)
            DEFINES="$DEFINES -D${key}=${val}"
          done
          DEFINES="$DEFINES -DCAMERA_MODEL_${CAM}=1"

          echo "DEFINES=$DEFINES" >> $GITHUB_ENV
          echo "Generated defines: $DEFINES"

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" -DPICO_SDK_PATH=${GITHUB_WORKSPACE}/pico-sdk

      - name: Build firmware
        run: |
          cd build
          # 将自定义引脚定义传递给编译器（通过修改 CMake 的编译选项）
          # 注意：此处我们使用环境变量 DEFINES，但需要在 CMake 中应用
          # 更简单的方法是在 CMakeLists.txt 中直接添加，或者在这里用 make 的 CFLAGS
          # 但 Ninja 不支持简单的 CFLAGS，因此我们采用修改 CMakeLists.txt 的方式
          # 或者直接在配置阶段传入 -DEXTRA_COMPILE_DEFINITIONS
          # 为了简便，我们重新配置 CMake 加入自定义定义
          cmake .. -DEXTRA_COMPILE_DEFINITIONS="${{ env.DEFINES }}"
          ninja

      - name: Rename output file
        run: |
          cd build
          UF2_FILE=$(ls *.uf2 | head -1)
          NEW_NAME="rp2040_ov2640_${CAM}_${GITHUB_RUN_NUMBER}.uf2"
          mv "$UF2_FILE" "$NEW_NAME"
          echo "UF2_FILE=$NEW_NAME" >> $GITHUB_ENV
          echo "Firmware file: $NEW_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-firmware-${{ github.event.inputs.camera_model || 'OV2640' }}
          path: build/*.uf2
          if-no-files-found: error
          retention-days: 30

      # 仅当推送标签且手动触发中选择上传时执行
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.upload_to_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
